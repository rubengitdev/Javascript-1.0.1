<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Regex Sandbox</title>
  </head>

  <body>
    <h1>Regex Sandbox</h1>
    <main>
      <!-- regex container -->
      <div id="regex-container">
        <label for="pattern"
          >Regex Pattern:
          <!-- pattern container -->
          <div id="pattern-container">
            /<input
              type="text"
              id="pattern"
              name="pattern"
              placeholder="Enter your regex pattern"
            />/
          </div>
        </label>
        <!-- flags container -->
        <div id="flags-container">
          <p>Flags:</p>
          <label for="i">
            <!-- checkbox i -->
            <input type="checkbox" name="flags" id="i" /> i
          </label>
          <label for="g">
            <!-- checkbox g -->
            <input type="checkbox" name="flags" id="g" /> g
          </label>
        </div>
      </div>

      <!-- test container -->
      <div id="test-container">
        <p>Test String:</p>
        <div
          id="test-string"
          placeholder="Enter your test string"
          contenteditable="true"
        ></div>
      </div>

      <!-- test button -->
      <button class="btn" id="test-btn" type="button">Test Regex</button>
      <!-- result container -->
      <div id="result-container">
        <h2>Result:</h2>
        <p id="result"></p>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
